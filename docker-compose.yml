# path: docker-compose.yml

version: "3.9"

services:

  # ── FastAPI Application ──────────────────────────────
  api:
    build: .
    container_name: finmarket_api
    ports:
      - "8000:8000"         # localhost:8000 → container:8000
    volumes:
      - .:/app              # live reload — code changes reflect immediately
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── PostgreSQL (local dev only — RDS used in production) ──
  postgres:
    image: pgvector/pgvector:pg16    # includes pgvector extension
    container_name: finmarket_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: finmarket_user
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: finmarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finmarket_user -d finmarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (local dev only — ElastiCache used in production) ──
  redis:
    image: redis:7-alpine
    container_name: finmarket_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Adminer — free DB GUI (localhost:8080) ────────────
  adminer:
    image: adminer:latest
    container_name: finmarket_adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data: